name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'test/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'src/**'
      - 'test/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # PH-AHG-002: cap wall-clock so a hung install/test can't burn the
    # default 6h of CI minutes. 15m is generous for ci + typecheck + tests.
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      # PH-AHG-003: audit is advisory (continue-on-error), but the signal
      # used to be invisible — a nameless step with no surfaced output. Name
      # it and write the findings to the run's Step Summary so an operator
      # can see vulnerabilities without the step failing the build.
      - name: npm audit (advisory — does not fail the build)
        continue-on-error: true
        run: |
          echo '### npm audit (advisory)' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          npm audit --audit-level=moderate 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - run: npm run build
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
