name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      # SHA-pinned to the same commits ci.yml uses — this OIDC-publishing
      # workflow must be at least as hardened as CI, not less. Bump both
      # SHAs in lockstep with ci.yml when those actions are upgraded.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Resolve version
        id: bump
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - run: npm ci

      - name: Verify (build + typecheck + lint + test)
        run: npm run verify

      - name: Generate SBOM
        run: npm run sbom

      # Node 22 bundles npm 10.9 which can sign Sigstore provenance but
      # cannot negotiate the OIDC auth path — publish returns a misleading
      # 404 "not in this registry". Sandbox-install npm@latest and prepend
      # to PATH so the publish step uses npm >=11.5. In-place
      # `npm install -g npm@latest` races on Node 22's arborist rebuild,
      # hence the sandbox dir. See feedback_npm_115_required_for_oidc.md.
      - name: Install npm >=11.5 in sandbox for OIDC trusted publishing
        run: |
          SANDBOX="$HOME/.npm-cli-sandbox"
          mkdir -p "$SANDBOX"
          pushd "$SANDBOX" >/dev/null
          echo '{"name":"npm-cli-sandbox","version":"0.0.0","private":true}' > package.json
          npm install --no-save --no-audit --no-fund --silent npm@latest
          popd >/dev/null
          echo "$SANDBOX/node_modules/.bin" >> "$GITHUB_PATH"
          "$SANDBOX/node_modules/.bin/npm" --version

      # cds-A-002: fail fast if the tag points at a commit whose
      # package.json version doesn't match the tag. Publishing would ship
      # npm at the package.json version while the GH release + SBOM carry
      # the tag version — a permanent divergence. Guard before publish.
      - name: Guard — package.json version equals tag version
        if: github.ref_type == 'tag'
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.bump.outputs.version }}"
          if [ "$PKG" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG) does not match tag version ($TAG_VERSION) — refusing to publish a divergent release." >&2
            exit 1
          fi
          echo "Version guard passed: package.json and tag both at $PKG"

      # cds-A-004: gate publish on a tag ref. A workflow_dispatch off a
      # non-tag ref would otherwise publish an orphan npm version while the
      # guarded GH-release and SBOM-upload steps below silently no-op.
      # workflow_dispatch on a non-tag ref is build + verify only (dry run).
      - name: Publish to npm with provenance (OIDC Trusted Publisher)
        if: github.ref_type == 'tag'
        run: npm publish --provenance --access public

      # Create the GitHub Release if it doesn't already exist. Idempotent —
      # `gh release create` errors if the release exists, so we probe first
      # and skip when present. Body pulls from CHANGELOG.md's matching
      # `## [<version>]` section when present (extracted to a notes file);
      # falls back to gh's auto-generated notes when no section is found.
      - name: Create GitHub release (if not exists)
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.bump.outputs.version }}"
          VERSION="${{ steps.bump.outputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping create."
          else
            # Extract the CHANGELOG section for this version: everything
            # between `## [<version>]` and the next `## [` heading.
            NOTES_FILE="$(mktemp)"
            awk -v ver="$VERSION" '
              $0 ~ "^## \\[" ver "\\]" { capture = 1; next }
              capture && /^## \[/ { exit }
              capture { print }
            ' CHANGELOG.md > "$NOTES_FILE"
            if [ -s "$NOTES_FILE" ]; then
              echo "Using CHANGELOG section for $VERSION as release notes."
              gh release create "$TAG" --title "$TAG" --notes-file "$NOTES_FILE"
            else
              echo "No CHANGELOG section for $VERSION; using auto-generated notes."
              gh release create "$TAG" --title "$TAG" --generate-notes
            fi
          fi

      - name: Upload SBOM to GitHub release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "v${{ steps.bump.outputs.version }}" sbom.json --clobber
