name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Resolve version
        id: bump
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - run: npm ci

      - name: Verify (build + typecheck + lint + test)
        run: npm run verify

      - name: Generate SBOM
        run: npm run sbom

      # Node 22 bundles npm 10.9 which can sign Sigstore provenance but
      # cannot negotiate the OIDC auth path — publish returns a misleading
      # 404 "not in this registry". Sandbox-install npm@latest and prepend
      # to PATH so the publish step uses npm >=11.5. In-place
      # `npm install -g npm@latest` races on Node 22's arborist rebuild,
      # hence the sandbox dir. See feedback_npm_115_required_for_oidc.md.
      - name: Install npm >=11.5 in sandbox for OIDC trusted publishing
        run: |
          SANDBOX="$HOME/.npm-cli-sandbox"
          mkdir -p "$SANDBOX"
          pushd "$SANDBOX" >/dev/null
          echo '{"name":"npm-cli-sandbox","version":"0.0.0","private":true}' > package.json
          npm install --no-save --no-audit --no-fund --silent npm@latest
          popd >/dev/null
          echo "$SANDBOX/node_modules/.bin" >> "$GITHUB_PATH"
          "$SANDBOX/node_modules/.bin/npm" --version

      - name: Publish to npm with provenance (OIDC Trusted Publisher)
        run: npm publish --provenance --access public

      - name: Upload SBOM to GitHub release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "v${{ steps.bump.outputs.version }}" sbom.json --clobber
